<!DOCTYPE html>
<html lang="en">
    <head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>RELAY - Live Chat </title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
	<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg:        #0a0a0f;
    --surface:   #111118;
    --surface2:  #16161f;
    --border:    #1e1e2e;
    --accent:    #e8ff47;
    --accent2:   #47ffc8;
    --accent3:   #ff6b6b;
    --text:      #d4d4e8;
    --muted:     #5a5a7a;
    --join-col:  #47ffc8;
    --leave-col: #ff6b6b;
    --sent-bg:      #1a2604;
    --sent-border:  #334d08;
    --sent-text:    #cce066;
    --sent-name:    #e8ff47;
    --recv-bg:      #041a15;
    --recv-border:  #0d3328;
    --recv-text:    #92dbc8;
    --recv-name:    #47ffc8;
}

    html, body { height: 100%; }
    body {
	background: var(--bg);
	color: var(--text);
	font-family: 'Space Mono', monospace;
	font-size: 14px;
	display: flex;
	align-items: center;
	justify-content: center;
	min-height: 100vh;
	overflow: hidden;
    }
    body::before {
	content: '';
	position: fixed;
	inset: 0;
	background-image:
	    linear-gradient(rgba(232,255,71,0.025) 1px, transparent 1px),
	linear-gradient(90deg, rgba(232,255,71,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    }

    /* ─── Login ─────────────────────────────── */
    #login-screen {
	display: flex; flex-direction: column; align-items: center; gap: 32px;
	animation: fadeUp 0.5s ease both; z-index: 1;
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 60px; font-weight: 800; letter-spacing: -3px; color: var(--accent); line-height: 1; }
    .logo span { color: var(--text); opacity: 0.25; }
    .logo-sub { font-size: 10px; letter-spacing: 5px; color: var(--muted); text-align: center; margin-top: -18px; }
    .login-box { border: 1px solid var(--border); padding: 40px; width: 360px; background: var(--surface); position: relative; }
    .login-box::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .login-label { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
    .login-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'Space Mono', monospace; font-size: 16px; padding: 12px 14px; outline: none; transition: border-color 0.2s; letter-spacing: 1px; }
    .login-input:focus { border-color: var(--accent); }
    .login-input::placeholder { color: var(--muted); }
    .login-btn { margin-top: 20px; width: 100%; padding: 14px; background: var(--accent); color: #0a0a0f; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; border: none; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
    .login-btn:hover { opacity: 0.88; }
    .login-btn:active { transform: scale(0.98); }

    /* ─── Chat layout ────────────────────────── */
    #chat-app { display: none; width: 100vw; height: 100vh; flex-direction: column; }
    #chat-app.visible { display: flex; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; gap: 16px; }
    .header-logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); letter-spacing: -1px; flex-shrink: 0; }
    .header-center { flex: 1; display: flex; justify-content: center; }

    /* Online users pill */
    .users-pill { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); padding: 6px 18px; font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; transition: border-color 0.3s, color 0.3s; }
    .users-pill.active { border-color: rgba(71,255,200,0.45); }
    .pip-group { display: flex; gap: 3px; }
    .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .users-pill.active .pip { background: var(--join-col); }
    .users-pill.active .pip:nth-child(2) { opacity: 0.6; }
    .users-pill.active .pip:nth-child(3) { opacity: 0.3; }
    #user-count { color: var(--text); font-weight: 700; font-size: 13px; }

    .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .conn-status { display: flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .status-dot.online { background: var(--join-col); box-shadow: 0 0 6px var(--join-col); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 4px var(--join-col); } 50% { box-shadow: 0 0 12px var(--join-col); } }
    .user-badge { font-size: 10px; letter-spacing: 2px; color: var(--accent); border: 1px solid rgba(232,255,71,0.35); padding: 4px 10px; text-transform: uppercase; background: rgba(232,255,71,0.05); }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 12px; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); }

    /* Bubble rows — SENT right / RECV left */
    .bubble-row { display: flex; flex-direction: column; max-width: 65%; animation: bubIn 0.22s ease both; }
    .bubble-row.sent  { align-self: flex-end;  align-items: flex-end; }
    .bubble-row.recv  { align-self: flex-start; align-items: flex-start; }

    .bubble-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; padding: 0 4px; }
    .bubble-name { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
    .bubble-row.sent .bubble-name { color: var(--sent-name); }
    .bubble-row.recv .bubble-name { color: var(--recv-name); }
    .bubble-time { font-size: 10px; color: var(--muted); }

    /* Direction label */
    .dir-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; padding: 2px 6px; border: 1px solid; }
    .bubble-row.sent  .dir-label { color: var(--sent-name);  border-color: var(--sent-border);  background: var(--sent-bg);  align-self: flex-end; }
    .bubble-row.recv  .dir-label { color: var(--recv-name);  border-color: var(--recv-border);  background: var(--recv-bg);  align-self: flex-start; }

    .bubble { padding: 11px 16px; border: 1px solid; line-height: 1.65; word-break: break-word; font-size: 13.5px; }
    .bubble-row.sent .bubble { background: var(--sent-bg); border-color: var(--sent-border); color: var(--sent-text); border-radius: 10px 2px 10px 10px; }
    .bubble-row.recv .bubble { background: var(--recv-bg); border-color: var(--recv-border); color: var(--recv-text); border-radius: 2px 10px 10px 10px; }

    /* System */
    .msg-system { align-self: center; font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; padding: 4px 14px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); animation: bubIn 0.2s ease both; }
    .msg-system.join  { color: var(--join-col);  border-color: rgba(71,255,200,0.2);  background: rgba(71,255,200,0.04); }
    .msg-system.leave { color: var(--leave-col); border-color: rgba(255,107,107,0.2); background: rgba(255,107,107,0.04); }

    /* Input bar */
    .input-bar { display: flex; padding: 16px 20px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; align-items: stretch; }
    .input-prompt { color: var(--accent); font-size: 15px; display: flex; align-items: center; padding: 0 12px; border: 1px solid var(--border); border-right: none; background: var(--bg); flex-shrink: 0; user-select: none; }
    .input-field { flex: 1; background: var(--bg); border: 1px solid var(--border); border-right: none; color: var(--text); font-family: 'Space Mono', monospace; font-size: 14px; padding: 13px 16px; outline: none; transition: border-color 0.2s; }
    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: var(--muted); }
    .char-count { font-size: 10px; color: var(--muted); padding: 0 10px; display: flex; align-items: center; border: 1px solid var(--border); border-left: none; border-right: none; background: var(--bg); min-width: 44px; justify-content: center; flex-shrink: 0; }
    .char-count.warn { color: var(--accent3); }
    .send-btn { padding: 0 26px; background: var(--accent); color: #0a0a0f; border: 1px solid var(--accent); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; flex-shrink: 0; }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; background: var(--muted); border-color: var(--muted); }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--accent3); color: #fff; font-size: 11px; letter-spacing: 2px; padding: 9px 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 99; }
    .toast.show { opacity: 1; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes bubIn  { from { opacity:0; transform:translateY(6px) scale(.97); } to { opacity:1; transform:translateY(0) scale(1); } }
	</style>
    </head>
    <body>

	<!-- LOGIN -->
	<div id="login-screen">
	    <div>
		<div class="logo">danichat<span></span></div>
		<div class="logo-sub">WEBSOCKET CHAT</div>
	    </div>
	    <div class="login-box">
		<div class="login-label">Choose your handle</div>
		<input id="username-input" class="login-input" type="text"
							       placeholder="e.g. void_runner" maxlength="24" autocomplete="off" />
		<button class="login-btn" onclick="connect()">ENTER CHANNEL</button>
	    </div>
	</div>

	<!-- CHAT -->
	<div id="chat-app">
	    <div class="header">
		<div class="header-logo">danichat</div>

		<div class="header-center">
		    <div class="users-pill" id="users-pill">
			<div class="pip-group">
			    <div class="pip"></div><div class="pip"></div><div class="pip"></div>
			</div>
			<span id="user-count">0</span>&nbsp;ONLINE
		    </div>
		</div>

		<div class="header-right">
		    <div class="conn-status">
			<span class="status-dot" id="status-dot"></span>
			<span id="status-text">CONNECTING</span>
		    </div>
		    <div class="user-badge" id="user-badge">—</div>
		</div>
	    </div>

	    <div class="messages" id="messages"></div>

	    <div class="input-bar">
		<div class="input-prompt">&gt;</div>
		<input id="msg-input" class="input-field" type="text"
							  placeholder="Type a message…" maxlength="500" autocomplete="off"
													oninput="updateChar()" />
		<div class="char-count" id="char-count">500</div>
		<button class="send-btn" id="send-btn" onclick="sendMsg()" disabled>SEND</button>
	    </div>
	</div>

	<div class="toast" id="toast"></div>

	<script>
	    let ws = null, me = '';
	    const $ = id => document.getElementById(id);

	    function connect() {
		const raw = $('username-input').value.trim();
		if (!raw) { toast('Enter a username first'); return; }
		me = raw.replace(/[^a-zA-Z0-9_\-\.]/g, '').slice(0, 24) || 'anon';
		$('login-screen').style.display = 'none';
		$('chat-app').classList.add('visible');
		$('user-badge').textContent = me;

		const proto = location.protocol === 'https:' ? 'wss' : 'ws';
		ws = new WebSocket(`${proto}://${location.host}/ws?username=${encodeURIComponent(me)}`);

		ws.onopen = () => {
		    setStatus(true);
		    $('send-btn').disabled = false;
		    $('msg-input').focus();
		    fetchCount();
		};
		ws.onclose = () => {
		    setStatus(false);
		    $('send-btn').disabled = true;
		    sysMsg('Disconnected from server', 'leave');
		    setCount(0);
		};
		ws.onerror = () => toast('Connection error');
		ws.onmessage = e => {
		    const m = JSON.parse(e.data);
		    if (m.type === 'join' || m.type === 'leave') {
			sysMsg(m.text, m.type);
			if (m.user_count !== undefined) setCount(m.user_count);
		    } else {
			bubble(m);
		    }
		};
	    }

	    function sendMsg() {
		if (!ws || ws.readyState !== 1) return;
		const text = $('msg-input').value.trim();
		if (!text) return;
		ws.send(JSON.stringify({ text }));
		$('msg-input').value = '';
		updateChar();
	    }

	    function updateChar() {
		const r = 500 - $('msg-input').value.length;
		$('char-count').textContent = r;
		$('char-count').classList.toggle('warn', r < 60);
	    }

	    $('username-input').addEventListener('keydown', e => { if (e.key==='Enter') connect(); });
	    document.addEventListener('keydown', e => { if (e.key==='Enter' && document.activeElement===$('msg-input')) sendMsg(); });

	    function bubble(msg) {
		const isSelf = msg.username === me;
		const t = msg.time ? new Date(msg.time) : new Date();
		const ts = t.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

		const row = document.createElement('div');
		row.className = `bubble-row ${isSelf ? 'sent' : 'recv'}`;
		row.innerHTML = `
      <div class="dir-label">${isSelf ? '▲ SENT' : '▼ RECEIVED'}</div>
      <div class="bubble-meta">
	<span class="bubble-name">${esc(msg.username)}</span>
	<span class="bubble-time">${ts}</span>
      </div>
      <div class="bubble">${esc(msg.text)}</div>`;
		append(row);
	    }

	    function sysMsg(text, type) {
		const el = document.createElement('div');
		el.className = `msg-system ${type}`;
		el.textContent = `— ${text} —`;
		append(el);
	    }

	    function append(el) {
		const m = $('messages');
		m.appendChild(el);
		m.scrollTop = m.scrollHeight;
	    }

	    function setCount(n) {
		$('user-count').textContent = n;
		$('users-pill').classList.toggle('active', n > 0);
	    }

	    function fetchCount() {
		fetch('/api/users').then(r=>r.json()).then(d=>setCount(d.online)).catch(()=>{});
	    }

	    function setStatus(on) {
		$('status-dot').className = 'status-dot' + (on ? ' online' : '');
		$('status-text').textContent = on ? 'ONLINE' : 'OFFLINE';
	    }

	    function esc(s) {
		return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
	    }

	    function toast(msg) {
		const t = $('toast');
		t.textContent = msg; t.classList.add('show');
		setTimeout(() => t.classList.remove('show'), 2800);
	    }
	</script>
    </body>
</html>
